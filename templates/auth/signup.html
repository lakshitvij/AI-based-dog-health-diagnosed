{% extends 'base.html' %}
{% block title %}Sign Up — DogHealth AI{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🐾</div>
    <h1 class="auth-title">Create an account</h1>
    <p class="auth-sub">Free forever. No credit card required.</p>

    <form method="POST" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          class="form-control"
          type="text"
          id="username"
          name="username"
          placeholder="dogowner123"
          autocomplete="username"
          minlength="3"
          maxlength="80"
          required
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          class="form-control"
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          placeholder="At least 6 characters"
          autocomplete="new-password"
          minlength="6"
          required
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <input
          class="form-control"
          type="password"
          id="confirm_password"
          name="confirm_password"
          placeholder="Repeat your password"
          autocomplete="new-password"
          required
        />
      </div>

      <button type="submit" class="btn btn-accent btn-full btn-lg mt-2">Create Account</button>
    </form>

    <p class="auth-foot">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
