{% extends 'base.html' %}
{% block title %}Log In — DogHealth AI{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🐾</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to access your pet profiles and diagnosis history.</p>

    <form method="POST" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="identifier">Username or Email</label>
        <input
          class="form-control"
          type="text"
          id="identifier"
          name="identifier"
          placeholder="you@example.com"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg mt-2">Log In</button>
    </form>

    <p class="auth-foot">
      Don't have an account? <a href="{{ url_for('signup') }}">Sign up free</a>
    </p>
  </div>
</div>
{% endblock %}
